
<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #ffe0ec 0%, #ffd6e8 30%, #ffe8f5 60%, #fce4ff 100%);
    min-height: 200vh;
    overflow: hidden;
  }
  #app {
    min-height: 200vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }
  .bg-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-heart { position: absolute; opacity: 0; animation: floatHeart linear infinite; }
  @keyframes floatHeart {
    0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.35; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-120px) rotate(360deg) scale(1.2); opacity: 0; }
  }
  .card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 44px 40px 32px;
    max-width: 480px;
    width: 100%;
    position: relative;
    z-index: 1;
    box-shadow: 0 20px 60px rgba(200,80,120,0.18), 0 4px 20px rgba(200,80,120,0.1);
    border: 1.5px solid rgba(255,180,210,0.5);
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.92); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .welcome-emoji { font-size: 64px; display: block; text-align: center; margin-bottom: 16px; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
  .welcome-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #b5375e; text-align: center; line-height: 1.3; margin-bottom: 10px; }
  .welcome-sub { font-size: 15px; color: #c06080; text-align: center; margin-bottom: 36px; font-style: italic; }
  .progress-bar-wrap { background: rgba(255,180,210,0.3); border-radius: 20px; height: 6px; margin-bottom: 28px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg,#e8688a,#c94070); border-radius: 20px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .progress-text { font-size: 13px; color: #c06080; text-align: right; margin-bottom: 10px; font-weight: 600; }
  .question-emoji { font-size: 40px; text-align: center; display: block; margin-bottom: 12px; }
  .question-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: #8b2a4a; text-align: center; margin-bottom: 28px; line-height: 1.4; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .option-btn {
    padding: 16px 12px; border-radius: 18px; border: 2px solid rgba(220,130,165,0.4);
    background: rgba(255,240,248,0.7); font-family: 'Nunito', sans-serif; font-size: 14px;
    font-weight: 600; color: #a03060; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); text-align: center; line-height: 1.4;
  }
  .option-btn:hover:not(.escape-btn) { background: linear-gradient(135deg,#ffb6cc,#ff8fab); color: white; border-color: transparent; transform: scale(1.05); box-shadow: 0 8px 24px rgba(200,80,120,0.3); }
  .option-btn.selected { background: linear-gradient(135deg,#e8688a,#c94070); color: white; border-color: transparent; transform: scale(1.05); box-shadow: 0 8px 24px rgba(200,80,120,0.35); }
  .escape-btn { position: fixed !important; cursor: pointer; z-index: 9999; transition: none !important; }
  .start-btn, .submit-btn { display: block; width: 100%; padding: 16px; border-radius: 50px; border: none; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); letter-spacing: 0.3px; }
  .start-btn { background: linear-gradient(135deg,#e8688a,#c94070); color: white; box-shadow: 0 8px 28px rgba(200,80,120,0.35); animation: bounce 2s ease-in-out infinite; }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 12px 36px rgba(200,80,120,0.45); }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .submit-btn { background: linear-gradient(135deg,#e8688a,#c94070); color: white; box-shadow: 0 8px 28px rgba(200,80,120,0.35); margin-top: 24px; font-size: 17px; }
  .submit-btn:hover { transform: scale(1.04); box-shadow: 0 14px 40px rgba(200,80,120,0.5); }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .slide-enter { animation: slideIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes slideIn { from{opacity:0;transform:translateX(60px) scale(0.95);} to{opacity:1;transform:translateX(0) scale(1);} }
  .love-screen { text-align: center; }
  .love-big-heart { font-size: 80px; display: block; margin-bottom: 16px; animation: heartbeat 1.2s ease-in-out infinite; }
  @keyframes heartbeat { 0%,100%{transform:scale(1);} 14%{transform:scale(1.18);} 28%{transform:scale(1);} 42%{transform:scale(1.1);} 70%{transform:scale(1);} }
  .love-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #b5375e; margin-bottom: 20px; line-height: 1.3; min-height: 80px; }
  .float-heart { position: fixed; pointer-events: none; z-index: 998; animation: floatUp 3s ease-in forwards; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-300px) scale(1.5);} }
  .cursor { display: inline-block; width: 2px; height: 1em; background: #c94070; margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50%{opacity:0;} }
  .stars { text-align: center; font-size: 18px; margin-bottom: 8px; opacity: 0.7; letter-spacing: 4px; }
  #confetti-canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; display:none; }
  .made-with-love {
    text-align: center;
    margin-top: 22px;
    font-size: 12px;
    color: #d0779a;
    font-style: italic;
    font-family: 'Nunito', sans-serif;
    letter-spacing: 0.3px;
    opacity: 0.85;
  }
  .made-with-love span { color: #e8688a; font-size: 13px; }
</style>
</head>
<body>
<div class="bg-hearts" id="bg-hearts"></div>
<canvas id="confetti-canvas"></canvas>
<div id="app">
  <div class="card" id="main-card">
    <div id="screen-content"></div>
    <div class="made-with-love">made with <span>♥</span> by Priyanshu Negi</div>
  </div>
</div>

<script>
const questions = [
  { emoji:"💗", q:"Do you love me?", good:{text:"Yes, Very Much 💗"}, wrong:{text:"No 😐"}, escapeIsGood:false },
  { emoji:"🥰", q:"How many times do you want me to say I love you to you?", good:{text:"A LOT!! 🥰"}, wrong:{text:"Not a Lot 😑"}, escapeIsGood:false },
  { emoji:"💍", q:"Do you think you can marry me?", good:{text:"Yes, Ofc! 💍"}, wrong:{text:"Thinking about it... 🤔"}, escapeIsGood:false },
  { emoji:"🥹", q:"Will you let me sleep on your tummy?", good:{text:"Yes love 🥹"}, wrong:{text:"Nop Eww 😒"}, escapeIsGood:false },
  { emoji:"💅", q:"Do you think you are a baddie?", good:{text:"Yes Duhh 💅"}, wrong:{text:"Nop softie 🥺"}, escapeIsGood:true }
];

let currentQ = -1;
let escapeBtnEl = null;
let moveInterval = null;

function initBgHearts() {
  const container = document.getElementById('bg-hearts');
  const hearts = ['💕','💗','💖','🌸','✨','💓','🌷','💝'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'bg-heart';
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    el.style.animationDelay = (Math.random() * 8) + 's';
    el.style.fontSize = (14 + Math.random() * 16) + 'px';
    container.appendChild(el);
  }
}

function renderWelcome() {
  stopEscapeBtn();
  const c = document.getElementById('screen-content');
  c.innerHTML = `
    <span class="welcome-emoji">💌</span>
    <h1 class="welcome-title">A little something<br>for you, Deepanita 💕</h1>
    <p class="welcome-sub">Answer honestly... or else 🥺</p>
    <button class="start-btn" onclick="startQuiz()">Start ✨</button>
  `;
}

function startQuiz() { currentQ = 0; renderQuestion(); }

function stopEscapeBtn() {
  if (moveInterval) { clearInterval(moveInterval); moveInterval = null; }
  if (escapeBtnEl && escapeBtnEl.parentNode) { escapeBtnEl.parentNode.removeChild(escapeBtnEl); escapeBtnEl = null; }
}

function renderQuestion() {
  stopEscapeBtn();
  const q = questions[currentQ];
  const c = document.getElementById('screen-content');

  const escapingLabel = q.escapeIsGood ? q.good.text : q.wrong.text;
  const staticLabel   = q.escapeIsGood ? q.wrong.text : q.good.text;
  const staticIsGood  = !q.escapeIsGood;

  c.innerHTML = `
    <div class="slide-enter">
      <div class="progress-text">${currentQ + 1} / ${questions.length} 💖</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="pbar" style="width:${(currentQ/questions.length)*100}%"></div></div>
      <span class="question-emoji">${q.emoji}</span>
      <p class="question-text">"${q.q}"</p>
      <div class="options-grid">
        <button class="option-btn" id="static-btn" onclick="selectAnswer(${staticIsGood})">${staticLabel}</button>
        <div id="escape-placeholder" style="border-radius:18px;border:2px dashed rgba(220,130,165,0.25);background:rgba(255,240,248,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(160,80,120,0.4);font-style:italic">catch me if you can 😝</div>
      </div>
    </div>
  `;

  setTimeout(() => {
    const pb = document.getElementById('pbar');
    if (pb) pb.style.width = ((currentQ + 1) / questions.length * 100) + '%';
  }, 50);

  spawnEscapeBtn(escapingLabel, q.escapeIsGood);
}

function spawnEscapeBtn(label, isGoodAnswer) {
  const btn = document.createElement('button');
  btn.className = 'option-btn escape-btn';
  btn.textContent = label;
  btn.style.padding = '16px 12px';
  btn.style.width = '170px';
  btn.style.fontSize = '14px';

  const margin = 20;
  const bw = 170, bh = 54;
  const maxX = window.innerWidth - bw - margin;
  const maxY = window.innerHeight - bh - margin;
  let bx = Math.max(margin, Math.min(maxX, Math.random() * (maxX - margin) + margin));
  let by = Math.max(margin, Math.min(maxY, Math.random() * (maxY - margin) + margin));
  btn.style.left = bx + 'px';
  btn.style.top = by + 'px';

  let mouseX = -999, mouseY = -999;
  function trackMouse(e) { mouseX = e.clientX; mouseY = e.clientY; }
  document.addEventListener('mousemove', trackMouse);

  moveInterval = setInterval(() => {
    if (!document.body.contains(btn)) { clearInterval(moveInterval); document.removeEventListener('mousemove', trackMouse); return; }
    const cx = bx + bw / 2, cy = by + bh / 2;
    const dx = cx - mouseX, dy = cy - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200) {
      const angle = Math.atan2(dy, dx);
      const speed = Math.max(70, 200 - dist);
      let nx = bx + Math.cos(angle) * speed * 0.38;
      let ny = by + Math.sin(angle) * speed * 0.38;
      if (nx < margin || nx > maxX) nx = Math.max(margin, Math.min(maxX, margin + Math.random() * (maxX - margin)));
      if (ny < margin || ny > maxY) ny = Math.max(margin, Math.min(maxY, margin + Math.random() * (maxY - margin)));
      bx = nx; by = ny;
      btn.style.left = bx + 'px';
      btn.style.top = by + 'px';
    }
  }, 28);

  document.body.appendChild(btn);
  escapeBtnEl = btn;
}

function selectAnswer(isGood) {
  stopEscapeBtn();
  const staticBtn = document.getElementById('static-btn');
  if (staticBtn) { staticBtn.classList.add('selected'); staticBtn.disabled = true; }
  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) renderQuestion();
    else renderSubmit();
  }, 500);
}

function renderSubmit() {
  stopEscapeBtn();
  const c = document.getElementById('screen-content');
  c.innerHTML = `
    <div class="slide-enter" style="text-align:center">
      <span style="font-size:52px;display:block;margin-bottom:14px;animation:pulse 1.5s ease-in-out infinite">🎀</span>
      <h2 style="font-family:'Playfair Display',serif;font-size:24px;color:#b5375e;margin-bottom:8px">You did amazing, my love!</h2>
      <p style="color:#c06080;font-size:14px;margin-bottom:30px;font-style:italic">Now tap the button below to see something special 💕</p>
      <button class="submit-btn" onclick="submitAnswers()">💌 Submit My Answers</button>
    </div>
  `;
}

function submitAnswers() {
  const btn = document.querySelector('.submit-btn');
  if (btn) { btn.textContent = '✨ Opening your heart...'; btn.disabled = true; }
  launchConfetti();
  setTimeout(() => renderLoveMessage(), 900);
}

function renderLoveMessage() {
  stopEscapeBtn();
  const c = document.getElementById('screen-content');
  c.innerHTML = `
    <div class="love-screen slide-enter">
      <span class="love-big-heart">💖</span>
      <div class="stars">✨ 🌸 ✨</div>
      <div class="love-title" id="love-text"><span class="cursor"></span></div>
      <p style="color:#c06080;font-size:13px;font-style:italic;margin-top:8px">Always & Forever, your silly one 🌸</p>
    </div>
  `;
  typeWriter("I love you soooo much, Princess 💖", "love-text", () => {
    setTimeout(() => launchFloatingHearts(), 300);
  });
}

function typeWriter(text, elId, cb) {
  const el = document.getElementById(elId);
  if (!el) return;
  let i = 0;
  function type() {
    if (!document.getElementById(elId)) return;
    el.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
    if (i < text.length) { i++; setTimeout(type, 55 + Math.random() * 30); }
    else { setTimeout(() => { el.innerHTML = text; if (cb) cb(); }, 200); }
  }
  type();
}

function launchFloatingHearts() {
  const hearts = ['💗','💕','💖','🌸','💝','✨','🌷'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'float-heart';
      el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      el.style.left = (10 + Math.random() * 80) + '%';
      el.style.bottom = '10%';
      el.style.animationDuration = (2 + Math.random() * 2) + 's';
      el.style.fontSize = (20 + Math.random() * 24) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 180);
  }
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#FFB6C1','#FF69B4','#FF1493','#FFD700','#FFA07A','#FF6B9D','#C9185B','#E91E8C'];
  for (let i = 0; i < 150; i++) {
    pieces.push({ x: Math.random() * canvas.width, y: -20 - Math.random() * 100, w: 6 + Math.random() * 10, h: 8 + Math.random() * 12, color: colors[Math.floor(Math.random() * colors.length)], vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4, rot: Math.random() * 360, vr: (Math.random() - 0.5) * 8, alpha: 1 });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (frame > 90) p.alpha -= 0.012;
      ctx.save(); ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x + p.w/2, p.y + p.h/2); ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 160) requestAnimationFrame(draw);
    else canvas.style.display = 'none';
  }
  requestAnimationFrame(draw);
}

initBgHearts();
renderWelcome();
</script>
</body>
</html>
